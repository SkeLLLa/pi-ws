[tools]
node = "26.3.0"
"github:pnpm/pnpm" = "11.5.1"

[tasks.sync-versions]
description = "Sync tool versions from .mise.toml to package.json"
run = """
#!/usr/bin/env bash
set -euo pipefail
PNPM_VERSION=$(mise current pnpm)
NODE_VERSION=$(mise current node)
cd "{{config_root}}"
node -e "
const fs = require('fs');
const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
pkg.packageManager = 'pnpm@' + '$PNPM_VERSION';
pkg.devEngines = { runtime: { name: 'node', version: '>=22.19.0' } };
fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\\n');
"
echo "Synced: node=$NODE_VERSION pnpm=$PNPM_VERSION"
"""

[tasks."examples:chat"]
description = "Build and run the browser chat example. Configure with PI_API_KEY, provider API keys, provider BASE_URL vars, PI_PROVIDER, PI_MODEL, PI_BASE_URL, PI_API, PI_WS_HOST, and PI_WS_PORT."
run = """
#!/usr/bin/env bash
set -euo pipefail
cd "{{config_root}}"
pnpm build
node examples/run-chat.mjs
"""
