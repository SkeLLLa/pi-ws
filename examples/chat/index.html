<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pi-ws chat example</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header panel">
        <div class="brand">
          <span class="eyebrow">pi-ws</span>
          <h1>Chat</h1>
        </div>
        <div class="connection-panel">
          <div class="connection-row">
            <label for="ws-url">URL</label>
            <input id="ws-url" name="ws-url" type="url" />
            <button id="connect" type="button">Connect</button>
            <label for="auth-token">Token</label>
            <input
              id="auth-token"
              name="auth-token"
              type="password"
              placeholder="Optional"
              class="token-input"
            />
            <button id="authenticate" type="button">Auth</button>
            <p id="status" class="status">Disconnected</p>
          </div>
          <div id="session-info" class="session-info" hidden></div>
        </div>
      </header>

      <div class="workspace">
        <div class="chat">
          <section id="messages" class="messages" aria-live="polite"></section>

          <form id="composer" class="composer">
            <textarea
              id="prompt"
              name="prompt"
              rows="3"
              placeholder="Ask Pi to explain this repository, write code, or generate a graph and save it as a PNG artifact..."
            ></textarea>
            <div class="composer-actions">
              <button id="abort" type="button">Abort</button>
              <button id="send" type="submit">Send</button>
            </div>
          </form>
        </div>

        <section class="panel event-log">
          <p class="event-log-heading">Raw events</p>
          <pre id="events"></pre>
        </section>
      </div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
